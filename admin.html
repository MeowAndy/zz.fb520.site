<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赞助管理 · 菲比 Bot</title>
  <link rel="icon" type="image/jpeg" href="assets/phoebe-avatar.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: { sans: ['Quicksand', 'PingFang SC', 'Microsoft YaHei UI', 'sans-serif'] },
        extend: { colors: { gold: '#FFC107', tide: '#4FC3F7' } }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #ffffff 0%, #fff9e6 45%, #e0f7fa 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(255,215,0,0.1);
      backdrop-filter: blur(12px);
      border-radius: 24px;
    }
  </style>
</head>
<body class="text-slate-700 font-sans">
  <!-- Login -->
  <div id="login-panel" class="min-h-screen flex items-center justify-center px-4">
    <div class="glass p-8 max-w-sm w-full text-center">
      <h1 class="text-2xl font-black text-slate-800 mb-2">🔐 管理入口</h1>
      <p class="text-sm text-slate-500 mb-6">请输入管理密码</p>
      <input id="pwd-input" type="password" placeholder="密码" class="w-full px-4 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-300 mb-4">
      <button onclick="doLogin()" class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 transition shadow-md">进入管理</button>
      <p id="login-err" class="text-red-500 text-sm mt-3 hidden">密码错误</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden min-h-screen flex flex-col items-center px-4 py-10">
    <div class="flex items-center gap-3 mb-6">
      <img src="assets/phoebe-avatar.jpg" alt="菲比" class="w-12 h-12 rounded-full shadow-lg border-2 border-amber-200">
      <h1 class="text-2xl font-black text-slate-800">赞助名单管理</h1>
    </div>

    <!-- Add form -->
    <div class="glass p-6 max-w-lg w-full mb-6">
      <h2 class="font-bold text-lg text-slate-700 mb-4">➕ 添加赞助者</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <input id="sp-name" type="text" placeholder="名字 *" class="px-4 py-2.5 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-300">
        <input id="sp-amount" type="text" placeholder="金额（如 ¥50）" class="px-4 py-2.5 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-300">
        <input id="sp-date" type="date" class="px-4 py-2.5 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-300">
      </div>
      <button onclick="addSponsor()" class="px-6 py-2.5 rounded-xl font-bold text-white bg-gradient-to-r from-green-400 to-green-500 hover:from-green-500 hover:to-green-600 transition shadow-md">添加</button>
      <span id="add-msg" class="ml-3 text-sm text-green-600 hidden">✓ 已添加</span>
    </div>

    
    <!-- 财务管理 -->
    <div class="glass p-6 max-w-lg w-full mb-6">
      <h2 class="font-bold text-lg text-slate-700 mb-4">💰 财务管理</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 输入区 -->
        <div class="space-y-3">
          <div>
            <label class="text-xs text-slate-500 mb-1 block">总收入 (¥)</label>
            <input id="fin-income-input" type="number" step="0.01" placeholder="总收入" oninput="liveCalc()" class="w-full px-4 py-2.5 rounded-xl border border-green-200 focus:outline-none focus:ring-2 focus:ring-green-300 bg-green-50/50">
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block">总支出 (¥)</label>
            <input id="fin-expense-input" type="number" step="0.01" placeholder="总支出" oninput="liveCalc()" class="w-full px-4 py-2.5 rounded-xl border border-red-200 focus:outline-none focus:ring-2 focus:ring-red-300 bg-red-50/50">
          </div>
          <div class="flex items-center gap-3">
            <button onclick="saveFinance()" class="px-5 py-2 rounded-xl font-bold text-white bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 transition shadow-md text-sm">保存</button>
            <span id="fin-msg" class="text-sm text-green-600 hidden">✓ 已保存</span>
          </div>
        </div>
        <!-- 实时预览区 -->
        <div class="bg-white/70 rounded-2xl p-4 border border-amber-100 flex flex-col justify-center items-center text-center">
          <p class="text-xs text-slate-400 mb-2">📊 实时预览</p>
          <div class="space-y-1.5 w-full">
            <div class="flex justify-between text-sm"><span class="text-slate-500">收入</span><span id="live-income" class="font-bold text-green-600">¥0</span></div>
            <div class="flex justify-between text-sm"><span class="text-slate-500">支出</span><span id="live-expense" class="font-bold text-red-500">¥0</span></div>
            <hr class="border-amber-100 my-1">
            <div class="flex justify-between text-sm"><span class="text-slate-500">盈亏</span><span id="live-balance" class="font-bold">¥0</span></div>
          </div>
          <p id="live-status" class="mt-2 text-xs font-bold px-3 py-1 rounded-full">-</p>
        </div>
      </div>
    </div>

    <!-- List -->
    <div class="glass p-6 max-w-lg w-full">
      <h2 class="font-bold text-lg text-slate-700 mb-4">📋 当前赞助名单</h2>
      <div id="sponsor-list" class="space-y-3">
        <p class="text-slate-400 text-sm">加载中...</p>
      </div>
    </div>

    <a href="/" class="mt-6 text-sm text-amber-500 hover:text-amber-600 font-bold">← 返回赞助页</a>
  </div>

  <script>
    let adminPwd = '';

    function doLogin() {
      const pwd = document.getElementById('pwd-input').value;
      fetch('/api/sponsors', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pwd },
        body: JSON.stringify({ name: '__auth_test__' })
      }).then(r => {
        if (r.status === 401) {
          document.getElementById('login-err').classList.remove('hidden');
          return;
        }
        // If it succeeded (unlikely with test name), delete it; otherwise just proceed
        adminPwd = pwd;
        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        // Delete the test entry if created
        if (r.status === 201) {
          r.json().then(data => {
            fetch('/api/sponsors/' + data.id, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pwd },
              body: JSON.stringify({})
            });
          });
        }
        loadSponsors();
        loadFinance();
      });
    }

    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function loadSponsors() {
      fetch('/api/sponsors').then(r => r.json()).then(list => {
        const container = document.getElementById('sponsor-list');
        if (!list.length) {
          container.innerHTML = '<p class="text-slate-400 text-sm">暂无赞助记录</p>';
          return;
        }
        container.innerHTML = list.map(s => `
          <div class="flex items-center justify-between bg-white/60 rounded-xl px-4 py-3 border border-amber-100">
            <div>
              <span class="font-bold text-slate-700">${escHtml(s.name)}</span>
              ${s.amount ? `<span class="ml-2 text-amber-500 font-bold">${escHtml(s.amount)}</span>` : ''}
              ${s.date ? `<span class="ml-2 text-slate-400 text-xs">${escHtml(s.date)}</span>` : ''}
            </div>
            <div class="flex gap-1">
              <button onclick="editSponsor('${s.id}','${escHtml(s.name)}','${escHtml(s.amount || '')}')" class="text-blue-400 hover:text-blue-600 font-bold text-sm px-2 py-1 rounded-lg hover:bg-blue-50 transition">编辑</button>
              <button onclick="delSponsor('${s.id}')" class="text-red-400 hover:text-red-600 font-bold text-sm px-2 py-1 rounded-lg hover:bg-red-50 transition">删除</button>
            </div>
          </div>
        `).join('');
      });
    }

    function addSponsor() {
      const name = document.getElementById('sp-name').value.trim();
      const amount = document.getElementById('sp-amount').value.trim();
      const date = document.getElementById('sp-date').value;
      if (!name) { alert('请输入名字'); return; }
      fetch('/api/sponsors', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
        body: JSON.stringify({ name, amount, date })
      }).then(r => {
        if (r.ok) {
          document.getElementById('sp-name').value = '';
          document.getElementById('sp-amount').value = '';
          document.getElementById('sp-date').value = '';
          const msg = document.getElementById('add-msg');
          msg.classList.remove('hidden');
          setTimeout(() => msg.classList.add('hidden'), 2000);
          loadSponsors();
          loadFinance();
        
        }
      });
    }

    function delSponsor(id) {
      if (!confirm('确定删除？')) return;
      fetch('/api/sponsors/' + id, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
        body: JSON.stringify({})
      }).then(() => { loadSponsors(); loadFinance(); });
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function liveCalc() {
      const income = parseFloat(document.getElementById('fin-income-input').value) || 0;
      const expense = parseFloat(document.getElementById('fin-expense-input').value) || 0;
      const balance = income - expense;
      document.getElementById('live-income').textContent = '¥' + income.toFixed(2);
      document.getElementById('live-expense').textContent = '¥' + expense.toFixed(2);
      const balEl = document.getElementById('live-balance');
      const statusEl = document.getElementById('live-status');
      if (balance >= 0) {
        balEl.textContent = '+¥' + balance.toFixed(2);
        balEl.className = 'font-bold text-green-600';
        statusEl.textContent = '盈利';
        statusEl.className = 'mt-2 text-xs font-bold px-3 py-1 rounded-full bg-green-100 text-green-700';
      } else {
        balEl.textContent = '-¥' + Math.abs(balance).toFixed(2);
        balEl.className = 'font-bold text-red-500';
        statusEl.textContent = '亏损';
        statusEl.className = 'mt-2 text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-600';
      }
    }

    function loadFinance() {
      fetch('/api/finance').then(r => r.json()).then(fin => {
        document.getElementById('fin-income-input').value = fin.income;
        document.getElementById('fin-expense-input').value = fin.expense;
        liveCalc();
      });
    }

    function saveFinance() {
      const income = parseFloat(document.getElementById('fin-income-input').value) || 0;
      const expense = parseFloat(document.getElementById('fin-expense-input').value) || 0;
      fetch('/api/finance', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
        body: JSON.stringify({ income, expense })
      }).then(r => r.json()).then(fin => {
        const msg = document.getElementById('fin-msg');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 2000);
        liveCalc();
      });
    }


    function editSponsor(id, name, amount) {
      const newName = prompt('修改名字（留空不改）:', name);
      if (newName === null) return;
      const newAmount = prompt('修改金额:', amount);
      if (newAmount === null) return;
      const body = {};
      if (newName.trim() && newName.trim() !== name) body.name = newName.trim();
      if (newAmount.trim() !== amount) body.amount = newAmount.trim();
      if (Object.keys(body).length === 0) return;
      body.password = adminPwd;
      fetch('/api/sponsors/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
        body: JSON.stringify(body)
      }).then(r => {
        if (r.ok) {
          loadSponsors();
          loadFinance();
        } else {
          alert('修改失败');
        }
      });
    }

  </script>
</body>
</html>
